[versions]
agp = "9.0.1"
composeMarkdown = "0.5.0"
coreKtx = "1.17.0"
generativeai = "0.9.0"
hiltAndroid = "2.59.2"
hiltNavigationCompose = "1.3.0"
hiltWork = "1.2.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.10.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.12.4"
kotlin = "2.0.21"
composeBom = "2024.09.00"
nav3Core = "1.0.1"
lifecycleViewmodelNav3 = "2.11.0-alpha02"
kotlinSerialization = "2.2.21"
